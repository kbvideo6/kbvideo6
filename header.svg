<svg width="880" height="180" viewBox="0 0 880 180" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
<defs>
  <path id="hw-sw" d="M 258 78 C 370 15, 510 15, 622 78"/>
  <path id="sw-hw" d="M 622 102 C 510 162, 370 162, 258 102"/>
  <style>
    @keyframes df { to { stroke-dashoffset: -24; } }
    @keyframes bl { 0%,49%{opacity:1} 50%,100%{opacity:0} }
    @keyframes pp { 0%,100%{opacity:.4} 50%{opacity:1} }
    @keyframes rs { 0%{opacity:0} 5%{opacity:1} 95%{opacity:1} 100%{opacity:0} }
  </style>
</defs>

<!-- Background -->
<rect width="880" height="180" fill="#0d1117"/>

<!-- Subtle PCB dot grid (left zone) -->
<g fill="#1c2d47" opacity=".6">
  <circle cx="40" cy="35" r="1.2"/><circle cx="60" cy="35" r="1.2"/><circle cx="80" cy="35" r="1.2"/><circle cx="100" cy="35" r="1.2"/>
  <circle cx="40" cy="55" r="1.2"/><circle cx="60" cy="55" r="1.2"/><circle cx="80" cy="55" r="1.2"/><circle cx="100" cy="55" r="1.2"/>
  <circle cx="40" cy="75" r="1.2"/><circle cx="60" cy="75" r="1.2"/><circle cx="80" cy="75" r="1.2"/><circle cx="100" cy="75" r="1.2"/>
  <circle cx="40" cy="95" r="1.2"/><circle cx="60" cy="95" r="1.2"/><circle cx="80" cy="95" r="1.2"/><circle cx="100" cy="95" r="1.2"/>
  <circle cx="40" cy="115" r="1.2"/><circle cx="60" cy="115" r="1.2"/><circle cx="80" cy="115" r="1.2"/><circle cx="100" cy="115" r="1.2"/>
  <circle cx="40" cy="135" r="1.2"/><circle cx="60" cy="135" r="1.2"/><circle cx="80" cy="135" r="1.2"/><circle cx="100" cy="135" r="1.2"/>
</g>

<!-- ====== LEFT TRACES (animated red, going outward from chip) ====== -->
<path d="M 112 58 H 82 V 40 H 55" fill="none" stroke="#e94560" stroke-width="1.3" stroke-dasharray="7 4">
  <animate attributeName="stroke-dashoffset" from="0" to="-22" dur="1.3s" repeatCount="indefinite"/>
</path>
<path d="M 112 71 H 68 V 58 H 45" fill="none" stroke="#e94560" stroke-width="1.3" stroke-dasharray="7 4">
  <animate attributeName="stroke-dashoffset" from="0" to="-22" dur="1.7s" repeatCount="indefinite" begin="0.3s"/>
</path>
<path d="M 112 84 H 48" fill="none" stroke="#e94560" stroke-width="1.3" stroke-dasharray="7 4">
  <animate attributeName="stroke-dashoffset" from="0" to="-22" dur="1.5s" repeatCount="indefinite" begin="0.1s"/>
</path>
<path d="M 112 97 H 62 V 107 H 44" fill="none" stroke="#e94560" stroke-width="1.3" stroke-dasharray="7 4">
  <animate attributeName="stroke-dashoffset" from="0" to="-22" dur="2s" repeatCount="indefinite" begin="0.5s"/>
</path>
<path d="M 112 110 H 74 V 128 H 50" fill="none" stroke="#e94560" stroke-width="1.3" stroke-dasharray="7 4">
  <animate attributeName="stroke-dashoffset" from="0" to="-22" dur="1.4s" repeatCount="indefinite" begin="0.2s"/>
</path>
<path d="M 112 123 H 58 V 140 H 38" fill="none" stroke="#e94560" stroke-width="1.3" stroke-dasharray="7 4">
  <animate attributeName="stroke-dashoffset" from="0" to="-22" dur="1.8s" repeatCount="indefinite" begin="0.7s"/>
</path>

<!-- Signal endpoint dots on left traces -->
<circle cx="55" cy="40" r="2.5" fill="#e94560"><animate attributeName="opacity" values=".3;1;.3" dur="1.3s" repeatCount="indefinite"/></circle>
<circle cx="45" cy="58" r="2.5" fill="#e94560"><animate attributeName="opacity" values=".3;1;.3" dur="1.7s" repeatCount="indefinite" begin=".3s"/></circle>
<circle cx="48" cy="84" r="2.5" fill="#e94560"><animate attributeName="opacity" values=".3;1;.3" dur="1.5s" repeatCount="indefinite" begin=".1s"/></circle>
<circle cx="44" cy="107" r="2.5" fill="#e94560"><animate attributeName="opacity" values=".3;1;.3" dur="2s" repeatCount="indefinite" begin=".5s"/></circle>
<circle cx="50" cy="128" r="2.5" fill="#e94560"><animate attributeName="opacity" values=".3;1;.3" dur="1.4s" repeatCount="indefinite" begin=".2s"/></circle>
<circle cx="38" cy="140" r="2.5" fill="#e94560"><animate attributeName="opacity" values=".3;1;.3" dur="1.8s" repeatCount="indefinite" begin=".7s"/></circle>

<!-- ====== CHIP BODY ====== -->
<rect x="112" y="43" width="116" height="94" rx="7" fill="#0e1c35" stroke="#e94560" stroke-width="1.5"/>
<!-- IC notch (orientation marker) -->
<path d="M 157 43 Q 170 37 183 43" fill="#0d1117" stroke="#e94560" stroke-width="1.5"/>
<!-- Chip internal PCB texture -->
<line x1="140" y1="43" x2="140" y2="137" stroke="#1c2d47" stroke-width="0.8" opacity=".7"/>
<line x1="170" y1="43" x2="170" y2="137" stroke="#1c2d47" stroke-width="0.8" opacity=".7"/>
<line x1="200" y1="43" x2="200" y2="137" stroke="#1c2d47" stroke-width="0.8" opacity=".7"/>
<line x1="112" y1="73" x2="228" y2="73" stroke="#1c2d47" stroke-width="0.8" opacity=".7"/>
<line x1="112" y1="103" x2="228" y2="103" stroke="#1c2d47" stroke-width="0.8" opacity=".7"/>
<!-- Chip text labels -->
<text x="170" y="82" text-anchor="middle" fill="#e94560" font-family="'Courier New',monospace" font-size="11" font-weight="bold">MCU</text>
<text x="170" y="96" text-anchor="middle" fill="#a8b2d8" font-family="'Courier New',monospace" font-size="8.5">ESP32</text>
<text x="170" y="113" text-anchor="middle" fill="#3a5a7a" font-family="'Courier New',monospace" font-size="7.5">IoT CORE</text>

<!-- Left pins (6 pins on IC left side) -->
<rect x="104" y="55" width="10" height="6" rx="1.5" fill="#e94560"/>
<rect x="104" y="68" width="10" height="6" rx="1.5" fill="#e94560"/>
<rect x="104" y="81" width="10" height="6" rx="1.5" fill="#e94560"/>
<rect x="104" y="94" width="10" height="6" rx="1.5" fill="#e94560"/>
<rect x="104" y="107" width="10" height="6" rx="1.5" fill="#e94560"/>
<rect x="104" y="120" width="10" height="6" rx="1.5" fill="#e94560"/>

<!-- Right pins (6 pins on IC right side) -->
<rect x="226" y="55" width="10" height="6" rx="1.5" fill="#a8b2d8"/>
<rect x="226" y="68" width="10" height="6" rx="1.5" fill="#a8b2d8"/>
<rect x="226" y="81" width="10" height="6" rx="1.5" fill="#a8b2d8"/>
<rect x="226" y="94" width="10" height="6" rx="1.5" fill="#a8b2d8"/>
<rect x="226" y="107" width="10" height="6" rx="1.5" fill="#a8b2d8"/>
<rect x="226" y="120" width="10" height="6" rx="1.5" fill="#a8b2d8"/>

<!-- RIGHT TRACES from chip going to bridge junction -->
<path d="M 236 58 H 256" fill="none" stroke="#a8b2d8" stroke-width="1" stroke-dasharray="5 4">
  <animate attributeName="stroke-dashoffset" from="0" to="-18" dur="1.2s" repeatCount="indefinite"/>
</path>
<path d="M 236 71 H 256" fill="none" stroke="#a8b2d8" stroke-width="1" stroke-dasharray="5 4">
  <animate attributeName="stroke-dashoffset" from="0" to="-18" dur="1.5s" repeatCount="indefinite" begin=".2s"/>
</path>
<path d="M 236 84 H 256" fill="none" stroke="#a8b2d8" stroke-width="1" stroke-dasharray="5 4">
  <animate attributeName="stroke-dashoffset" from="0" to="-18" dur="1.3s" repeatCount="indefinite" begin=".4s"/>
</path>
<path d="M 236 97 H 256" fill="none" stroke="#a8b2d8" stroke-width="1" stroke-dasharray="5 4">
  <animate attributeName="stroke-dashoffset" from="0" to="-18" dur="1.6s" repeatCount="indefinite" begin=".1s"/>
</path>
<path d="M 236 110 H 256" fill="none" stroke="#a8b2d8" stroke-width="1" stroke-dasharray="5 4">
  <animate attributeName="stroke-dashoffset" from="0" to="-18" dur="1.4s" repeatCount="indefinite" begin=".3s"/>
</path>
<path d="M 236 123 H 256" fill="none" stroke="#a8b2d8" stroke-width="1" stroke-dasharray="5 4">
  <animate attributeName="stroke-dashoffset" from="0" to="-18" dur="1.7s" repeatCount="indefinite" begin=".5s"/>
</path>

<!-- Zone label -->
<text x="170" y="162" text-anchor="middle" fill="#a8b2d8" font-family="'Courier New',monospace" font-size="9">ELECTRONICS / IoT</text>

<!-- ====== BRIDGE ZONE ====== -->
<!-- Bridge connector node left -->
<circle cx="258" cy="90" r="7" fill="#131d35" stroke="#e94560" stroke-width="1.2"/>
<circle cx="258" cy="90" r="3" fill="#e94560"><animate attributeName="opacity" values=".4;1;.4" dur="1.8s" repeatCount="indefinite"/></circle>

<!-- Upper bridge channel (hardware → software) -->
<path d="M 258 78 C 370 15, 510 15, 622 78" fill="none" stroke="#1a2d45" stroke-width="12"/>
<path d="M 258 78 C 370 15, 510 15, 622 78" fill="none" stroke="#e94560" stroke-width="1" opacity=".5"/>

<!-- Lower bridge channel (software → hardware) -->
<path d="M 258 102 C 370 162, 510 162, 622 102" fill="none" stroke="#1a2d45" stroke-width="12"/>
<path d="M 258 102 C 370 162, 510 162, 622 102" fill="none" stroke="#4a9eff" stroke-width="1" opacity=".5"/>

<!-- Bridge center zone label -->
<text x="440" y="87" text-anchor="middle" fill="#2a4060" font-family="'Courier New',monospace" font-size="8">HW → API</text>
<text x="440" y="97" text-anchor="middle" fill="#2a4060" font-family="'Courier New',monospace" font-size="8">API → HW</text>

<!-- Animated data packets HW to SW (upper bridge, red) -->
<circle r="4.5" fill="#e94560">
  <animate attributeName="opacity" values="0;1;1;0" dur="2.2s" repeatCount="indefinite" begin="0s"/>
  <animateMotion dur="2.2s" repeatCount="indefinite" begin="0s">
    <mpath xlink:href="#hw-sw"/>
  </animateMotion>
</circle>
<circle r="4.5" fill="#e94560">
  <animate attributeName="opacity" values="0;1;1;0" dur="2.2s" repeatCount="indefinite" begin="0.73s"/>
  <animateMotion dur="2.2s" repeatCount="indefinite" begin="0.73s">
    <mpath xlink:href="#hw-sw"/>
  </animateMotion>
</circle>
<circle r="4.5" fill="#e94560">
  <animate attributeName="opacity" values="0;1;1;0" dur="2.2s" repeatCount="indefinite" begin="1.46s"/>
  <animateMotion dur="2.2s" repeatCount="indefinite" begin="1.46s">
    <mpath xlink:href="#hw-sw"/>
  </animateMotion>
</circle>

<!-- Animated data packets SW to HW (lower bridge, blue) -->
<circle r="4.5" fill="#4a9eff">
  <animate attributeName="opacity" values="0;1;1;0" dur="2.2s" repeatCount="indefinite" begin="0.4s"/>
  <animateMotion dur="2.2s" repeatCount="indefinite" begin="0.4s">
    <mpath xlink:href="#sw-hw"/>
  </animateMotion>
</circle>
<circle r="4.5" fill="#4a9eff">
  <animate attributeName="opacity" values="0;1;1;0" dur="2.2s" repeatCount="indefinite" begin="1.13s"/>
  <animateMotion dur="2.2s" repeatCount="indefinite" begin="1.13s">
    <mpath xlink:href="#sw-hw"/>
  </animateMotion>
</circle>
<circle r="4.5" fill="#4a9eff">
  <animate attributeName="opacity" values="0;1;1;0" dur="2.2s" repeatCount="indefinite" begin="1.86s"/>
  <animateMotion dur="2.2s" repeatCount="indefinite" begin="1.86s">
    <mpath xlink:href="#sw-hw"/>
  </animateMotion>
</circle>

<!-- Bridge connector node right -->
<circle cx="622" cy="90" r="7" fill="#131d35" stroke="#4a9eff" stroke-width="1.2"/>
<circle cx="622" cy="90" r="3" fill="#4a9eff"><animate attributeName="opacity" values=".4;1;.4" dur="1.8s" repeatCount="indefinite" begin=".5s"/></circle>

<!-- ====== CODE TERMINAL ZONE ====== -->
<!-- Outer terminal box -->
<rect x="628" y="26" width="218" height="122" rx="7" fill="#080f1e" stroke="#2a3a5a" stroke-width="1.5"/>
<!-- Title bar -->
<rect x="628" y="26" width="218" height="22" rx="7" fill="#121e35"/>
<rect x="628" y="40" width="218" height="8" fill="#121e35"/>
<!-- Traffic light dots -->
<circle cx="644" cy="37" r="4" fill="#e94560" opacity=".85"/>
<circle cx="658" cy="37" r="4" fill="#e8a020" opacity=".85"/>
<circle cx="672" cy="37" r="4" fill="#3dc95a" opacity=".85"/>
<!-- Title text -->
<text x="737" y="42" text-anchor="middle" fill="#3a5a7a" font-family="'Courier New',monospace" font-size="8.5">api.server.js</text>

<!-- Code content inside terminal -->
<!-- Line 1 -->
<text x="640" y="68" fill="#4a9eff" font-family="'Courier New',monospace" font-size="9">app</text>
<text x="662" y="68" fill="#a8b2d8" font-family="'Courier New',monospace" font-size="9">.get(</text>
<text x="700" y="68" fill="#e8a020" font-family="'Courier New',monospace" font-size="9">'/sensor'</text>
<!-- Line 2 -->
<text x="640" y="83" fill="#a8b2d8" font-family="'Courier New',monospace" font-size="9">  res.</text>
<text x="672" y="83" fill="#3dc95a" font-family="'Courier New',monospace" font-size="9">json</text>
<text x="697" y="83" fill="#a8b2d8" font-family="'Courier New',monospace" font-size="9">(hw.</text>
<text x="724" y="83" fill="#4a9eff" font-family="'Courier New',monospace" font-size="9">read</text>
<text x="749" y="83" fill="#a8b2d8" font-family="'Courier New',monospace" font-size="9">())</text>
<!-- Line 3 -->
<text x="640" y="98" fill="#a8b2d8" font-family="'Courier New',monospace" font-size="9">  mqtt.</text>
<text x="678" y="98" fill="#3dc95a" font-family="'Courier New',monospace" font-size="9">stream</text>
<text x="723" y="98" fill="#a8b2d8" font-family="'Courier New',monospace" font-size="9">(io)</text>
<!-- Line 4 -->
<text x="640" y="113" fill="#3a5a7a" font-family="'Courier New',monospace" font-size="9">  status: </text>
<text x="698" y="113" fill="#3dc95a" font-family="'Courier New',monospace" font-size="9">'live'</text>
<!-- Line 5 with blink cursor -->
<text x="640" y="128" fill="#a8b2d8" font-family="'Courier New',monospace" font-size="9">}</text>
<rect x="650" y="118" width="5.5" height="11" fill="#e94560">
  <animate attributeName="opacity" values="1;1;0;0;1" dur="1.1s" repeatCount="indefinite"/>
</rect>

<!-- Traces from code zone left back to bridge -->
<path d="M 626 77 H 622" fill="none" stroke="#4a9eff" stroke-width="1" stroke-dasharray="4 3">
  <animate attributeName="stroke-dashoffset" from="0" to="-14" dur="1.2s" repeatCount="indefinite"/>
</path>
<path d="M 626 103 H 622" fill="none" stroke="#e94560" stroke-width="1" stroke-dasharray="4 3">
  <animate attributeName="stroke-dashoffset" from="0" to="-14" dur="1.4s" repeatCount="indefinite" begin=".3s"/>
</path>

<!-- Code zone label -->
<text x="737" y="164" text-anchor="middle" fill="#a8b2d8" font-family="'Courier New',monospace" font-size="9">API DEVELOPMENT</text>

<!-- Bottom separator line -->
<line x1="30" y1="172" x2="850" y2="172" stroke="#1c2d47" stroke-width="0.8" opacity=".5"/>

</svg>
